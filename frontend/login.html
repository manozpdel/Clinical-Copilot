<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — Clinical Copilot</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div id="toast-container" class="toast-container"></div>

  <div class="auth-shell">
    <div class="auth-logo">Clinical Copilot</div>
    <p class="auth-welcome">Sign in to ask clinical questions by text or voice.</p>

    <div id="login-loading" class="loading-indicator" style="justify-content:center;">
      <div class="spinner-large"></div>
    </div>

    <div id="google-button-container" class="hidden"></div>

    <div id="login-error" class="error-banner hidden" role="alert"></div>
  </div>

  <script type="module" src="js/auth.js"></script>
  <script type="module">
    import { isAuthenticated, initGoogleSignIn } from "./js/auth.js";

    const loadingEl = document.getElementById("login-loading");
    const buttonContainer = document.getElementById("google-button-container");
    const errorEl = document.getElementById("login-error");

    function showLoginError(message) {
      errorEl.textContent = message;
      errorEl.classList.remove("hidden");
    }

    async function init() {
      if (isAuthenticated()) {
        window.location.href = "index.html";
        return;
      }

      try {
        await initGoogleSignIn("google-button-container");
        loadingEl.classList.add("hidden");
        buttonContainer.classList.remove("hidden");
      } catch (error) {
        loadingEl.classList.add("hidden");
        showLoginError(
          error.message || "Unable to load sign-in. Please try again."
        );
      }
    }

    init();
  </script>
</body>
</html>
