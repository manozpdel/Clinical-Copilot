<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — Clinical Copilot</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div id="toast-container" class="toast-container"></div>

  <div class="auth-shell">
    <div class="auth-logo">Clinical Copilot</div>
    <p class="auth-welcome">Sign in to ask clinical questions by text or voice.</p>

    <div id="login-loading" class="loading-indicator loading-centered">
      <div class="spinner-large"></div>
    </div>

    <div id="google-button-container" class="hidden"></div>

    <div id="login-error" class="error-banner hidden" role="alert"></div>
  </div>

  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/login.js"></script>
</body>
</html>
