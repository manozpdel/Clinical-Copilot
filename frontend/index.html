<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinical Copilot</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">Clinical Copilot</div>
    <div id="nav-unauthenticated" class="nav-section hidden">
      <a href="login.html" class="nav-link">Log in</a>
    </div>
    <div id="nav-authenticated" class="nav-section hidden">
      <a href="index.html" class="nav-link">Chat</a>
      <a href="admin.html" class="nav-link">Admin</a>
      <button id="open-history-button" class="nav-link nav-link-button" type="button">History</button>
      <div class="user-menu">
        <button id="user-menu-button" class="user-menu-button" type="button">
          <span id="user-avatar" class="user-avatar"></span>
          <span id="user-name" class="user-name"></span>
        </button>
        <div id="user-dropdown" class="user-dropdown hidden">
          <div class="dropdown-email" id="user-email"></div>
          <a href="profile.html" class="dropdown-item">Profile</a>
          <button id="logout-button" class="dropdown-item logout" type="button">Log out</button>
        </div>
      </div>
    </div>
  </nav>

  <div id="toast-container" class="toast-container"></div>

  <div class="app-shell">
    <header class="app-header">
      <h1>Clinical Copilot</h1>
      <p class="subtitle">Ask a clinical question, by text or by voice — responses stream live.</p>
    </header>

    <main class="app-main">
      <section class="input-panel">
        <div class="tabs">
          <button class="tab-button active" data-tab="text-tab" type="button">Text</button>
          <button class="tab-button" data-tab="voice-tab" type="button">Voice</button>
        </div>

        <form id="text-tab" class="tab-content active" novalidate>
          <label for="question-input">Your question</label>
          <textarea id="question-input" rows="3" placeholder="e.g. What medications is patient P0005 taking?"></textarea>
          <button id="submit-text-button" class="primary-button" type="submit">Ask</button>
        </form>

        <form id="voice-tab" class="tab-content" novalidate>
          <label for="audio-input">Upload audio (.wav, .mp3, .m4a)</label>
          <input id="audio-input" type="file" accept=".wav,.mp3,.m4a,audio/*" />
          <button id="submit-voice-button" class="primary-button" type="submit">Ask by voice</button>
        </form>
      </section>

      <div id="error-banner" class="error-banner hidden" role="alert"></div>

      <section id="streaming-panel" class="result-panel hidden">
        <h2>Live Response</h2>
        <div id="node-status" class="node-status">
          <span class="node-badge" data-node="planner">Planning</span>
          <span class="node-badge" data-node="tool_router">Retrieving Context</span>
          <span class="node-badge" data-node="generator">Generating Answer</span>
          <span class="node-badge" data-node="evaluator">Evaluating Response</span>
        </div>
        <div id="progress-bar-container" class="progress-bar-container">
          <div id="progress-bar-fill" class="progress-bar-fill"></div>
        </div>
        <p id="transcript-line" class="transcript-line hidden"></p>
        <p id="streaming-answer-text" class="streaming-answer"><span id="typing-cursor" class="typing-cursor hidden">▌</span></p>
      </section>

      <section id="answer-panel" class="result-panel hidden">
        <div class="response-actions">
          <button id="thumbs-up-button" class="icon-button" type="button" title="Helpful">👍</button>
          <button id="thumbs-down-button" class="icon-button" type="button" title="Not helpful">👎</button>
          <div id="rating-container" class="rating-widget"></div>
          <button id="comment-button" class="icon-button" type="button" title="Leave feedback">💬</button>
        </div>
      </section>

      <section id="citations-panel" class="result-panel hidden">
        <h2>Citations</h2>
        <ul id="citations-list"></ul>
      </section>

      <section id="evaluation-panel" class="result-panel hidden">
        <h2>Evaluation</h2>
        <dl id="evaluation-list" class="evaluation-grid"></dl>
      </section>

      <section id="history-panel" class="result-panel hidden">
        <h2>Your History</h2>
        <div id="history-list"></div>
      </section>
    </main>
  </div>

  <div id="feedback-modal-container"></div>
  <div id="comparison-modal-container"></div>

  <script type="module" src="js/router.js"></script>
  <script type="module" src="js/guards.js"></script>
  <script type="module" src="js/rating.js"></script>
  <script type="module" src="js/feedback.js"></script>
  <script type="module" src="js/history.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
