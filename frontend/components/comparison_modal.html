          <h4>Response A</h4>
          <p class="comparison-timestamp" id="comparison-timestamp-a"></p>
          <p id="comparison-answer-a"></p>
          <div class="comparison-meta" id="comparison-meta-a"></div>
        </div>
        <div class="comparison-column">
          <h4>Response B</h4>
          <p class="comparison-timestamp" id="comparison-timestamp-b"></p>
          <p id="comparison-answer-b"></p>

        </div>
      </div>
      <div class="modal-actions">
        <button id="comparison-modal-close" class="secondary-button" type="button">Close</button>
      </div>
    </div>
  </div>
