line-length = 100
target-version = "py313"

[lint]
select = ["E", "F", "W", "I", "C", "N", "B", "A"]
ignore = ["E501", "SIM117", "B008"]  # Ignore line length, nested with, and FastAPI Depends

[lint.per-file-ignores]
"tests/*" = ["S101"]
"scripts/*" = ["E501"]
"app/api/*" = ["B008"]  # Ignore B008 in FastAPI endpoints
"auth/dependencies.py" = ["B008"]  # Ignore B008 in auth dependencies
