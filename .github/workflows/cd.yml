name: CD

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/docker/backend.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:${{ github.sha }},ghcr.io/${{ github.repository }}/backend:latest

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/docker/worker.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/worker:${{ github.sha }},ghcr.io/${{ github.repository }}/worker:latest

      - name: Build and push beat
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/docker/beat.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/beat:${{ github.sha }},ghcr.io/${{ github.repository }}/beat:latest

      - name: Build and push nginx
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/nginx/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/nginx:${{ github.sha }},ghcr.io/${{ github.repository }}/nginx:latest

  smoke-test:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      - run: uv sync --all-extras --dev
      - run: uv run pytest tests/test_smoke.py -v